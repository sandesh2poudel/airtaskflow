<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Air Task Flow – Sales CRM Dashboard">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Air Task Flow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Air Task Flow</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f14;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .loader-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #2D6CDF, #7C3AED);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .loader-title {
      color: #e2e8f0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .loader-spin {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(45,108,223,0.2);
      border-top-color: #2D6CDF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-logo">ATF</div>
    <div class="loader-title">Air Task Flow</div>
    <div class="loader-spin"></div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
